<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance & Tech Insight</title>
    <style>
        :root { --bg-color: #0f172a; --card-bg: #1e293b; --text-main: #f8fafc; --text-muted: #94a3b8; --accent: #38bdf8; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; }
        header { background-color: var(--card-bg); padding: 20px; text-align: center; border-bottom: 2px solid #334155; }
        header h1 { margin: 0; color: var(--accent); font-size: 2.2rem; }
        header p { margin: 5px 0 0 0; color: var(--text-muted); }
        .main-container { max-width: 1100px; margin: 40px auto; padding: 0 20px; }
        .grid-view { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .custom-card { background-color: var(--card-bg); padding: 25px; border-radius: 12px; cursor: pointer; border: 1px solid #334155; transition: transform 0.2s, border-color 0.2s; }
        .custom-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .custom-card h3 { margin: 0 0 10px 0; color: var(--accent); font-size: 1.4rem; }
        .custom-card p { margin: 0; color: var(--text-muted); font-size: 0.95rem; }
        .content-section { display: none; background-color: var(--card-bg); padding: 35px; border-radius: 12px; border: 1px solid #334155; }
        .back-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .back-btn:hover { background: var(--accent); color: var(--bg-color); }
        .article-content { white-space: pre-wrap; line-height: 1.7; font-size: 1.1rem; }
    </style>
</head>
<body>

    <header>
        <h1>Finance & Tech Insight 📊</h1>
        <p>මූල්‍ය සහ දත්ත විශ්ලේෂණ දැනුම ඔබට සමීපම තැනකින්</p>
    </header>

    <div class="main-container">
        <div id="main-view">
            <h2 id="view-title">ප්‍රධාන විෂය පථයන් (Main Topics)</h2>
            <div id="menu-grid" class="grid-view"></div>
        </div>

        <div id="article-view" class="content-section">
            <button id="back-btn" class="back-btn">← ආපසු</button>
            <div id="post-body" class="article-content">ලෝඩ් වෙමින්...</div>
        </div>
    </div>

    <script>
        let siteData = {};
        let currentLevel = 'main'; 
        let currentTopicId = '';

        // site-menu.txt එක කියවා සයිට් එක සෙටප් කිරීම
        fetch('site-menu.txt')
            .then(res => res.json())
            .then(data => {
                siteData = data;
                renderMainMenu();
            })
            .catch(() => {
                document.getElementById('menu-grid').innerHTML = "<p style='color:red;'>site-menu.txt ෆයිල් එක කියවීමට නොහැක!</p>";
            });

        function renderMainMenu() {
            currentLevel = 'main';
            document.getElementById('article-view').style.display = 'none';
            document.getElementById('main-view').style.display = 'block';
            document.getElementById('view-title').innerText = "ප්‍රධාන විෂය පථයන් (Main Topics)";
            
            let html = '';
            for (let id in siteData) {
                html += `
                    <div class="custom-card" onclick="renderSubMenu('${id}')">
                        <h3>${siteData[id].title}</h3>
                        <p>${siteData[id].desc}</p>
                    </div>`;
            }
            document.getElementById('menu-grid').innerHTML = html;
        }

        function renderSubMenu(topicId) {
            currentLevel = 'sub';
            currentTopicId = topicId;
            document.getElementById('view-title').innerText = siteData[topicId].title + " - ලිපි ලැයිස්තුව";
            
            let html = `<button class="back-btn" onclick="renderMainMenu()">← ප්‍රධාන Topics වෙත</button><br><br>`;
            let articles = siteData[topicId].articles;
            
            articles.forEach(art => {
                html += `
                    <div class="custom-card" style="margin-bottom:15px;" onclick="loadArticle('${art.file}')">
                        <h3>${art.name}</h3>
                        <p>${art.short}</p>
                    </div>`;
            });
            document.getElementById('menu-grid').innerHTML = html;
        }

        function loadArticle(fileName) {
            document.getElementById('main-view').style.display = 'none';
            document.getElementById('article-view').style.display = 'block';
            
            document.getElementById('back-btn').onclick = function() {
                document.getElementById('article-view').style.display = 'none';
                document.getElementById('main-view').style.display = 'block';
                renderSubMenu(currentTopicId);
            };

            fetch(fileName)
                .then(res => { if(!res.ok) throw new Error(); return res.text(); })
                .then(text => { document.getElementById('post-body').innerHTML = text; })
                .catch(() => { document.getElementById('post-body').innerHTML = "<h3 style='color:red;'>ලිපිය තවම ලියා නැත!</h3><p>GitHub එකේ " + fileName + " නමින් ෆයිල් එකක් සාදන්න.</p>"; });
        }
    </script>

<!--Add user message section -->
<div style="background-color: var(--card-bg); padding: 30px; border-radius: 12px; border: 1px solid #334155; margin-top: 40px;">
    <h3 style="color: var(--accent); margin-top: 0;">අප වෙත අදහස් යොමු කරන්න 💬</h3>
    <form id="contactForm" style="display: flex; flex-direction: column; gap: 15px;">
        <div>
            <label style="display: block; margin-bottom: 5px; color: var(--text-muted);">ඔබගේ නම (Name):</label>
            <input type="text" id="formName" required style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: var(--bg-color); color: var(--text-main); box-sizing: border-box;">
        </div>
        <div>
            <label style="display: block; margin-bottom: 5px; color: var(--text-muted);">අදාළ මාතෘකාව (Subject ):</label>
            <input type="text" id="formSub" required style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: var(--bg-color); color: var(--text-main); box-sizing: border-box;">
        </div>
        <div>
            <label style="display: block; margin-bottom: 5px; color: var(--text-muted);">විද්‍යුත් ලිපිය (Email):</label>
            <input type="email" id="formEmail" required style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: var(--bg-color); color: var(--text-main); box-sizing: border-box;">
        </div>
        <div>
            <label style="display: block; margin-bottom: 5px; color: var(--text-muted);">පණිවිඩය (Message):</label>
            <textarea id="formMessage" rows="4" required style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #334155; background: var(--bg-color); color: var(--text-main); box-sizing: border-box; resize: vertical;"></textarea>
        </div>
        <button type="submit" style="background: var(--accent); color: var(--bg-color); padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer;">Submit කරන්න 🚀</button>
    </form>
    <p id="formStatus" style="margin-top: 15px; display: none; font-weight: bold;"></p>
</div>

<script>
document.getElementById('contactForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const statusText = document.getElementById('formStatus');
    statusText.style.display = 'block';
    statusText.style.color = 'var(--accent)';
    statusText.innerText = 'දත්ත ඇතුළත් කරමින්... කරුණාකර රැඳී සිටින්න.';
    
    const formData = {
        name: document.getElementById('formName').value,
        subject :document.getElementById('formSub ').value,
        email: document.getElementById('formEmail').value,
        message: document.getElementById('formMessage').value,
    };
    
    // මෙතන තියෙන URL එක වෙනුවට පියවර 1 දී ඔයාට ලැබුණු Web app URL එක දාන්න
    const webAppUrl = 'https://script.google.com/macros/s/AKfycbwAp8yhOjthkCgXznQBrET-HqS3gUTIJH2gkJAwtIQO-d1ZA2Qli04_qoezd3UOUvgf_Q/exec';
    
    fetch(webAppUrl, {
        method: 'POST',
        mode: 'no-cors', // Cross-Origin අවුල් මඟහරවා ගැනීමට
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(formData)
    })
    .then(() => {
        statusText.style.color = '#4ade80';
        statusText.innerText = 'ස්තූතියි! ඔබගේ දත්ත සාර්ථකව අප වෙත ලැබුණි. ✅';
        document.getElementById('contactForm').reset();
    })
    .catch(() => {
        statusText.style.color = '#ef4444';
        statusText.innerText = 'දත්ත යොමුකිරීමේදී දෝෂයක් ඇති විය.නැවත උත්සාහ කරන්න. ❌';
    });
});
</script>
<!--End of the user message section-->
    
</body>
</html>
