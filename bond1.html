<div class="yield-curve-wrapper">
    <div class="curve-header">
        <div>
            <h2>Government Securities Yield Curve 🏛️</h2>
            <p class="curve-subtitle">Treasury Bills & Bonds Yield Rates (%)</p>
        </div>
        <span class="market-tag">Capital Alliance (CAL) Market Data</span>
    </div>

    <div class="curve-chart-container">
        <canvas id="yieldCurveChart"></canvas>
    </div>

    <div class="yield-data-grid">
        <div class="yield-data-box">
            <span class="tenor-label">3 Months (T-Bill)</span>
            <span class="yield-rate" id="cal-3m">12.25%</span>
        </div>
        <div class="yield-data-box">
            <span class="tenor-label">1 Year (T-Bill)</span>
            <span class="yield-rate" id="cal-1y">13.10%</span>
        </div>
        <div class="yield-data-box">
            <span class="tenor-label">5 Years (T-Bond)</span>
            <span class="yield-rate" id="cal-5y">13.95%</span>
        </div>
        <div class="yield-data-box">
            <span class="tenor-label">10 Years (T-Bond)</span>
            <span class="yield-rate" id="cal-10y">14.60%</span>
        </div>
        <div class="yield-data-box">
            <span class="tenor-label">20 Years (T-Bond)</span>
            <span class="yield-rate" id="cal-20y">15.10%</span>
        </div>
    </div>
</div>

<style>
    .yield-curve-wrapper {
        max-width: 1100px;
        margin: 30px auto;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 24px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
    }
    .curve-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        border-bottom: 2px solid #f1f5f9;
        padding-bottom: 15px;
        margin-bottom: 20px;
    }
    .curve-header h2 {
        font-size: 1.4rem;
        color: #0f172a;
        margin: 0;
        font-weight: 700;
    }
    .curve-subtitle {
        font-size: 0.9rem;
        color: #64748b;
        margin: 4px 0 0 0;
        font-weight: 500;
    }
    .market-tag {
        font-size: 0.75rem;
        font-weight: 700;
        background: #fff1f2; /* CAL Brand එකට ගැලපෙන ලා රතු/රෝස පැහැති Tag එකක් */
        color: #e11d48;
        padding: 6px 12px;
        border-radius: 20px;
        text-transform: uppercase;
        border: 1px solid #ffe4e6;
    }
    .curve-chart-container {
        position: relative;
        width: 100%;
        height: 350px;
        margin-bottom: 25px;
    }
    .yield-data-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 15px;
    }
    .yield-data-box {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 12px;
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 4px;
    }
    .tenor-label {
        font-size: 0.8rem;
        color: #64748b;
        font-weight: 700;
        text-transform: uppercase;
    }
    .yield-rate {
        font-size: 1.25rem;
        font-weight: 700;
        color: #0f172a;
    }
    @media (max-width: 768px) {
        .curve-header { flex-direction: column; gap: 10px; }
        .market-tag { align-self: flex-start; }
        .yield-data-grid { grid-template-columns: repeat(2, 1fr); }
    }
</style>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const ctx = document.getElementById('yieldCurveChart').getContext('2d');
        
        const gradient = ctx.createLinearGradient(0, 0, 0, 350);
        gradient.addColorStop(0, 'rgba(225, 29, 72, 0.15)'); // CAL theme එකට මැච් වෙන්න ලා රතු Gradient එකක්
        gradient.addColorStop(1, 'rgba(225, 29, 72, 0.0)');

        // 📝 X-Axis: CAL එකේ බහුලවම පාවිච්චි වෙන කාලසීමාවන් (Maturities)
        const labels = ['3 Months', '6 Months', '1 Year', '2 Years', '3 Years', '5 Years', '6 Years', '8 Years', '10 Years', '20 Years'];
        
        // 📈 Y-Axis: CAL Secondary Market Yield Rates (ආදර්ශ දත්ත - ඔයාට CAL සයිට් එක බලාගෙන මේවා වෙනස් කරන්න පුළුවන්)
        const calYieldData = [12.25, 12.65, 13.10, 13.40, 13.65, 13.95, 14.15, 14.40, 14.60, 15.10];

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'CAL Yield Rate (%)',
                    data: calYieldData,
                    borderColor: '#e11d48', // CAL Brand එක නිරූපණය වන තද රතු/රෝස Line එකක්
                    borderWidth: 3,
                    pointBackgroundColor: '#ffffff',
                    pointBorderColor: '#e11d48',
                    pointBorderWidth: 2,
                    pointRadius: 5,
                    pointHoverRadius: 7,
                    fill: true,
                    backgroundColor: gradient,
                    tension: 0.3 // Smooth Curve Effect
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return ` CAL Yield: ${context.parsed.y.toFixed(2)}%`;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { display: false },
                        ticks: { color: '#64748b', font: { size: 11, weight: '600' } },
                        title: { display: true, text: 'Maturity Period (Tenor)', color: '#475569', font: { size: 12, weight: '700' } }
                    },
                    y: {
                        grid: { color: '#f1f5f9' },
                        ticks: { 
                            color: '#64748b', 
                            font: { size: 11, weight: '600' },
                            callback: function(value) { return value + '%'; }
                        },
                        title: { display: true, text: 'Yield to Maturity (YTM)', color: '#475569', font: { size: 12, weight: '700' } }
                    }
                }
            }
        });
    });
</script>
