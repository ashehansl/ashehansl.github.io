<div class="yield-curve-wrapper">
    <div class="curve-header">
        <div>
            <h2>Government Securities Yield Curve 🏛️</h2>
            <p class="curve-subtitle">Treasury Bills & Bonds Yield Rates (%)</p>
        </div>
        <span class="market-tag">Central Bank / WealthTrust Data</span>
    </div>

    <div class="curve-chart-container">
        <canvas id="yieldCurveChart"></canvas>
    </div>

    <div class="yield-data-grid">
        <div class="yield-data-box">
            <span class="tenor-label">3 Months</span>
            <span class="yield-rate">12.50%</span>
        </div>
        <div class="yield-data-box">
            <span class="tenor-label">1 Year</span>
            <span class="yield-rate">13.20%</span>
        </div>
        <div class="yield-data-box">
            <span class="tenor-label">5 Years</span>
            <span class="yield-rate">14.10%</span>
        </div>
        <div class="yield-data-box">
            <span class="tenor-label">10 Years</span>
            <span class="yield-rate">14.85%</span>
        </div>
        <div class="yield-data-box">
            <span class="tenor-label">20 Years</span>
            <span class="yield-rate">15.20%</span>
        </div>
    </div>
</div>

<style>
    .yield-curve-wrapper {
        max-width: 1100px;
        margin: 30px auto;
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 16px;
        padding: 24px;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
    }
    .curve-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        border-bottom: 2px solid #f1f5f9;
        padding-bottom: 15px;
        margin-bottom: 20px;
    }
    .curve-header h2 {
        font-size: 1.4rem;
        color: #0f172a;
        margin: 0;
        font-weight: 700;
    }
    .curve-subtitle {
        font-size: 0.9rem;
        color: #64748b;
        margin: 4px 0 0 0;
        font-weight: 500;
    }
    .market-tag {
        font-size: 0.75rem;
        font-weight: 700;
        background: #f1f5f9;
        color: #475569;
        padding: 6px 12px;
        border-radius: 20px;
        text-transform: uppercase;
        border: 1px solid #e2e8f0;
    }
    
    /* Chart Styling */
    .curve-chart-container {
        position: relative;
        width: 100%;
        height: 350px;
        margin-bottom: 25px;
    }

    /* Bottom Grid Styling */
    .yield-data-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 15px;
    }
    .yield-data-box {
        background: #f8fafc;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 12px;
        text-align: center;
        display: flex;
        flex-direction: column;
        gap: 4px;
    }
    .tenor-label {
        font-size: 0.8rem;
        color: #64748b;
        font-weight: 700;
        text-transform: uppercase;
    }
    .yield-rate {
        font-size: 1.25rem;
        font-weight: 700;
        color: #0f172a;
    }

    /* Responsive Design */
    @media (max-width: 768px) {
        .curve-header { flex-direction: column; gap: 10px; }
        .market-tag { align-self: flex-start; }
        .yield-data-grid { grid-template-columns: repeat(2, 1fr); }
    }
</style>

<script>
    document.addEventListener("DOMContentLoaded", function() {
        const ctx = document.getElementById('yieldCurveChart').getContext('2d');
        
        // ලස්සන Smooth Line එකක් ගන්න Background Gradient එකක් හදාගන්නවා
        const gradient = ctx.createLinearGradient(0, 0, 0, 350);
        gradient.addColorStop(0, 'rgba(56, 189, 248, 0.25)'); // ලා නිල් පාට
        gradient.addColorStop(1, 'rgba(56, 189, 248, 0.0)');

        // කාල සීමාවන් (X-AxisLabels) සහ වත්මන් ආදර්ශ Yield Rates (Y-Axis Data)
        const labels = ['3 Months', '6 Months', '1 Year', '2 Years', '5 Years', '10 Years', '15 Years', '20 Years', '30 Years'];
        const yieldData = [12.50, 12.85, 13.20, 13.60, 14.10, 14.85, 15.05, 15.20, 15.40]; // Normal Upward Sloping Curve එකක්

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: labels,
                datasets: [{
                    label: 'Current Yield (%)',
                    data: yieldData,
                    borderColor: '#0284c7', // තද නිල් පාට Line එක
                    borderWidth: 3,
                    pointBackgroundColor: '#ffffff',
                    pointBorderColor: '#0284c7',
                    pointBorderWidth: 2,
                    pointRadius: 5,
                    pointHoverRadius: 7,
                    fill: true,
                    backgroundColor: gradient,
                    tension: 0.3 // වක්‍රය Smooth කරන්න (Curve Effect)
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: { display: false },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return ` Yield: ${context.parsed.y.toFixed(2)}%`;
                            }
                        }
                    }
                },
                scales: {
                    x: {
                        grid: { display: false },
                        ticks: { color: '#64748b', font: { size: 11, weight: '600' } },
                        title: { display: true, text: 'Time to Maturity (Tenor)', color: '#475569', font: { size: 12, weight: '700' } }
                    },
                    y: {
                        grid: { color: '#f1f5f9' },
                        ticks: { 
                            color: '#64748b', 
                            font: { size: 11, weight: '600' },
                            callback: function(value) { return value + '%'; }
                        },
                        title: { display: true, text: 'Yield to Maturity (YTM)', color: '#475569', font: { size: 12, weight: '700' } }
                    }
                }
            }
        });
    });
</script>
